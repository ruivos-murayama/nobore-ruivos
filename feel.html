<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#06202a" />
<title>FEEL LAB — のぼれRUIVOSくん</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #06202a;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", system-ui, sans-serif;
    user-select: none; -webkit-user-select: none; }
  #c { display: block; position: fixed; inset: 0; touch-action: none; }
  #ui { position: fixed; top: 0; left: 0; right: 0; padding: max(10px,env(safe-area-inset-top)) 14px 10px;
    display: flex; gap: 8px; pointer-events: none; z-index: 5; }
  .chip { background: rgba(0,0,0,0.35); color: #aef7ee; font-weight: 800; font-size: 13px;
    padding: 5px 11px; border-radius: 999px; backdrop-filter: blur(4px); }
  #tap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    z-index: 10; background: radial-gradient(120% 120% at 50% 30%, rgba(8,40,48,0.2), rgba(6,32,42,0.85)); }
  #tap .card { text-align: center; color: #d7fff7; }
  #tap h1 { font-size: 30px; margin: 0 0 6px; color: #ff4fa3; text-shadow: 0 0 24px rgba(255,79,163,0.6); }
  #tap p { font-size: 14px; line-height: 1.8; opacity: 0.85; }
  #tap button { margin-top: 18px; border: none; font-size: 20px; font-weight: 900; color: #06202a;
    background: linear-gradient(180deg,#5ff0d8,#16e0c0); padding: 13px 32px; border-radius: 999px;
    box-shadow: 0 0 30px rgba(22,224,192,0.5); cursor: pointer; }
  #tap button:active { transform: translateY(2px); }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui">
    <span class="chip" id="hint">引っぱって、はなす</span>
    <span class="chip" id="dbg"></span>
  </div>
  <div id="tap">
    <div class="card">
      <h1>FEEL LAB</h1>
      <p>ぷるんと引っぱって、ビヨンッと弾く。<br>壁・天井にも貼り付く。緑の液体に触れると即リスタート。<br>上の光のゲートが出口。</p>
      <button id="go">▶ さわる</button>
    </div>
  </div>
  <script src="cave.js"></script>
  <script src="feel.js"></script>
</body>
</html>
